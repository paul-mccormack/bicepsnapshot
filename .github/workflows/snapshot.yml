# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Generate Bicep Snapshot

on:
  pull_request_target:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  comment-on-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Add or update PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.payload.pull_request.number;
            const marker = "<!-- bicep-snapshot-comment -->";
            const body = `${marker}
            Snapshot workflow triggered for this PR.
            I will now validate the Bicep snapshot on this update.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number
            });

            const existing = comments.find(
              c => c.user.type === "Bot" && c.body && c.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body
              });
            }

  generate-snapshot:
    name: Validate snapshot
    runs-on: ubuntu-latest
    needs: comment-on-pr
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Bicep CLI
        uses: anthony-c-martin/setup-bicep@v0.3

      - name: Validate snapshot
        id: validate-snapshot
        shell: pwsh
        run: |
          $snapshot_result = bicep snapshot main.bicepparam --mode validate --subscription-id 8a9d9b4d-56c8-4fe7-b760-6b84698a3353 --location uksouth

          if ($snapshot_result -eq $null) {
              Write-Host "`n"
              Write-Host "No changes detected in the snapshot."
              Write-Host "`n"
              $snapshot_result = "No changes detected in the snapshot."
          } else {
              Write-Host "`n"
              Write-Host "Changes detected in the snapshot:"
              Write-Host "`n"
              Write-Host $snapshot_result
          }
          "snap_shot_result=$snapshot_result" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding UTF8 -Append


      - name: Comment Results on PR
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `${{ steps.validate-snapshot.outputs.snap_shot_result }}`
            });
